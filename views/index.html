<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kipper Shop</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="#">Kipper Shop</a>

        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="#">Home</a>
            <a class="nav-link" href="#">Products</a>
            <a class="nav-link" href="#">Cart</a>
        </div>
    </div>
</nav>

<section class="bg-light py-5 text-center">
    <div class="container">
        <h1 class="display-4">Welcome to Kipper Shop</h1>
        <p class="lead">
            Find your favorite products here.
        </p>

        <button class="btn btn-primary btn-lg">
            Shop Now
        </button>
    </div>
</section>

<section class="container my-5">

    <h2 class="mb-4">Featured Products</h2>

    <div class="row">

        <div class="col-md-3">
            <div class="card">
                <img src="https://picsum.photos/300/200" class="card-img-top">
                <div class="card-body">
                    <h5>Product 1</h5>
                    <p>$99</p>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card">
                <img src="https://picsum.photos/301/200" class="card-img-top">
                <div class="card-body">
                    <h5>Product 2</h5>
                    <p>$129</p>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card">
                <img src="https://picsum.photos/302/200" class="card-img-top">
                <div class="card-body">
                    <h5>Product 3</h5>
                    <p>$159</p>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card">
                <img src="https://picsum.photos/303/200" class="card-img-top">
                <div class="card-body">
                    <h5>Product 4</h5>
                    <p>$199</p>
                </div>
            </div>
        </div>

    </div>

</section>

<footer class="bg-dark text-white text-center py-3">
    © 2026 Kipper Shop
</footer>

</body>
</html>
