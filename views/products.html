<!DOCTYPE html>
<html>
<head>
    <title>Products - Kipper Shop</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">

</nav>

<div class="container mt-5">

    <h1 class="mb-4">

    <div class="row">

                    <h5>iPhone 17</h5>

                    <p>$39,900</p>

                        View Detail
                    </a>

                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card">
                <img src="https://picsum.photos/300/200?2" class="card-img-top">

                <div class="card-body">

                    <h5>MacBook Air M5</h5>

                    <p>$42,900</p>

                    <a href="/products/2" class="btn btn-primary">
                        View Detail
                    </a>

                </div>
            </div>
        </div>

    </div>

</div>

</html>
